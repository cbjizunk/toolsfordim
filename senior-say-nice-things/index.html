<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Senior Say-Nice-Things Notes</title>
  <!--
    KIND NOTES — Single-file web app
    ════════════════════════════════════════════════════════════
    HOW IT WORKS
      Students pick their name + PIN to log in. They write a short
      note for each classmate. Notes save silently to a Google Form
      (one row per note). On the next login, previous notes load
      from the Sheet published as a public CSV.

      Admin section (password-protected) includes:
        • Student list management (paste new list each year)
        • Completion tracker — who has/hasn't written about whom
        • Browse all notes written about a specific student
        • Export / print card per student (superlatives placeholder)

    SETUP CHECKLIST — fill in CONFIG below, then push to GitHub Pages
      [ ] Create a Google Form with exactly 4 Short Answer questions:
            1. Author Name
            2. PIN
            3. Subject Name
            4. Note Text
      [ ] Copy the live form's formResponse URL → FORM_URL
      [ ] In the linked Sheet: File > Share > Publish to web > CSV
          Copy that URL → CSV_URL
      [ ] Find entry IDs (view form source, look for name="entry.###")
          Paste them into CONFIG.FIELDS
      [ ] Set ADMIN_PASSWORD to something you'll remember
      [ ] Update CLASS_NAME and the default STUDENTS list
      [ ] Push to your GitHub repo at /project2/index.html

    PRIVACY NOTE
      The CSV URL is publicly readable — that's what allows students
      to reload their own prior notes. Notes about a student are only
      visible in the Admin section. PINs appear in the sheet, which
      is fine for this "don't peek at Christmas presents" use case.
      Students who look hard enough CAN find the raw CSV; the notes
      written *about* them are visible there. This is low-stakes.
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Lora:wght@600;700&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet"
  />
  <style>
    /* ══════════════════════════════════════════════════
     * DESIGN TOKENS
     * Warm / light theme — friendly and positive.
     * ══════════════════════════════════════════════════ */
    :root {
      --bg:            #fef9f0;   /* warm cream page background  */
      --surface:       #ffffff;   /* white cards / inputs        */
      --surface-warm:  #fffdf7;   /* slightly tinted white       */
      --border:        #e7e5df;   /* soft warm border            */
      --border-focus:  #d97706;   /* amber focus ring            */
      --primary:       #92400e;   /* warm brown — main CTA       */
      --primary-hover: #78350f;
      --accent:        #d97706;   /* amber — progress / alerts   */
      --accent-light:  #fef3c7;   /* pale amber fill             */
      --text:          #292524;   /* near-black warm             */
      --text-muted:    #78716c;   /* warm gray                   */
      --success:       #15803d;
      --error:         #b91c1c;
      --progress-fill: #f59e0b;
      --radius:        10px;
      --shadow-sm:     0 1px 3px rgba(0,0,0,.08);
    }

    /* ══════════════════════════════════════════════════
     * RESET & BASE
     * ══════════════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      line-height: 1.5;
    }

    h1, h2 { font-family: 'Lora', Georgia, serif; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ══════════════════════════════════════════════════
     * SHARED FORM ELEMENTS
     * ══════════════════════════════════════════════════ */
    .input {
      width: 100%;
      padding: 9px 12px;
      border: 1.5px solid var(--border);
      border-radius: 7px;
      font-size: 15px;
      font-family: inherit;
      background: var(--surface);
      color: var(--text);
      transition: border-color .15s;
    }
    .input:focus {
      outline: none;
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px rgba(217,119,6,.15);
    }
    select.input { cursor: pointer; }
    textarea.input { resize: vertical; }

    label {
      display: block;
      font-size: .875rem;
      font-weight: 600;
      margin-bottom: 5px;
    }

    .hint {
      font-size: .8rem;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* ══════════════════════════════════════════════════
     * BUTTONS
     * ══════════════════════════════════════════════════ */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 9px 18px;
      border: none;
      border-radius: 7px;
      font-family: inherit;
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, transform .1s, box-shadow .15s;
    }
    .btn:active:not(:disabled) { transform: translateY(1px); }
    .btn:disabled { opacity: .5; cursor: not-allowed; }

    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover:not(:disabled) {
      background: var(--primary-hover);
      box-shadow: 0 3px 10px rgba(120,53,15,.25);
    }

    .btn-ghost {
      background: transparent;
      border: 1.5px solid var(--border);
      color: var(--text-muted);
    }
    .btn-ghost:hover:not(:disabled) {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-light);
    }

    .btn-sm   { padding: 5px 12px; font-size: .8rem; }
    .btn-row  { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }

    /* ══════════════════════════════════════════════════
     * LOGIN SCREEN
     * ══════════════════════════════════════════════════ */
    .login-wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      gap: 18px;
    }

    .login-header    { text-align: center; }
    .login-emoji     { font-size: 3rem; line-height: 1; margin-bottom: 8px; }
    .login-title     { font-size: 2rem; color: var(--primary); margin-bottom: 4px; }
    .login-subtitle  { color: var(--text-muted); }

    .login-card {
      width: 100%;
      max-width: 380px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .admin-link { font-size: .8rem; color: var(--text-muted); text-align: center; }

    /* ══════════════════════════════════════════════════
     * NOTES SCREEN — TOP BAR
     * ══════════════════════════════════════════════════ */
    .notes-wrap {
      max-width: 700px;
      margin: 0 auto;
      padding: 0 16px 48px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      margin: 0 -16px 20px;
      box-shadow: var(--shadow-sm);
    }
    .topbar-left  { display: flex; align-items: center; gap: 6px; font-weight: 600; }
    .topbar-right { display: flex; align-items: center; gap: 10px; }
    .topbar-user  { font-size: .85rem; color: var(--text-muted); }

    /* ══════════════════════════════════════════════════
     * PROGRESS BAR
     * ══════════════════════════════════════════════════ */
    .progress-wrap {
      background: var(--surface-warm);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 14px;
    }
    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: .85rem;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .progress-count    { font-weight: 600; color: var(--text); }
    .progress-bar-bg   { height: 8px; background: var(--border); border-radius: 99px; overflow: hidden; }
    .progress-bar-fill { height: 100%; background: var(--progress-fill); border-radius: 99px; transition: width .4s ease; }
    .progress-complete { margin-top: 8px; font-size: .85rem; color: var(--success); font-weight: 600; }

    /* ══════════════════════════════════════════════════
     * SAVE BAR
     * ══════════════════════════════════════════════════ */
    .save-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .save-status         { font-size: .85rem; display: flex; align-items: center; gap: 5px; }
    .save-status.unsaved { color: var(--accent); }
    .save-status.saved   { color: var(--success); }
    .unsaved-dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; display: inline-block; }
    .saved-check { font-weight: 700; }
    .autosave-note { font-size: .75rem; color: var(--text-muted); margin-left: auto; }

    /* ══════════════════════════════════════════════════
     * NOTE CARDS
     * ══════════════════════════════════════════════════ */
    .notes-list { display: flex; flex-direction: column; gap: 12px; }

    .note-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      transition: border-color .2s;
    }
    .note-card--done {
      border-color: #d1fae5;
      background: #fafffe;
    }

    .note-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .note-student-name { font-weight: 600; }
    .note-status        { font-size: .75rem; padding: 2px 8px; border-radius: 99px; }
    .note-status--empty { background: #f5f5f4; color: var(--text-muted); }
    .note-status--done  { background: #dcfce7; color: #15803d; font-weight: 600; }

    .note-textarea {
      width: 100%;
      padding: 8px 10px;
      border: 1.5px solid var(--border);
      border-radius: 7px;
      font-family: inherit;
      font-size: .9rem;
      color: var(--text);
      background: var(--surface-warm);
      resize: vertical;
      line-height: 1.55;
      transition: border-color .15s;
    }
    .note-textarea:focus {
      outline: none;
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px rgba(217,119,6,.12);
    }

    /* Warning shown when a previously-saved note is manually cleared */
    .note-clear-warning {
      margin-top: 7px;
      padding: 8px 10px;
      background: #fff7ed;
      border: 1.5px solid #fed7aa;
      border-radius: 7px;
      font-size: .8rem;
      color: #9a3412;
      line-height: 1.5;
    }
    .note-clear-warning strong { color: #7c2d12; }

    /* Clear Note button — danger-ghost style, small, sits below warning */
    .note-clear-btn {
      margin-top: 6px;
      font-size: .78rem;
      padding: 4px 10px;
      border: 1.5px solid #fca5a5;
      color: #b91c1c;
      background: transparent;
    }
    .note-clear-btn:hover:not(:disabled) {
      background: #fef2f2;
      border-color: #f87171;
      color: #991b1b;
    }

    /* ══════════════════════════════════════════════════
     * ADMIN SHELL
     * ══════════════════════════════════════════════════ */
    .admin-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 600;
    }

    .admin-tabs {
      display: flex;
      border-bottom: 2px solid var(--border);
      background: var(--surface);
      padding: 0 24px;
      overflow-x: auto;
    }
    .admin-tab {
      padding: 11px 16px;
      border: none;
      background: transparent;
      font-family: inherit;
      font-size: .875rem;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      white-space: nowrap;
      transition: color .15s;
    }
    .admin-tab:hover       { color: var(--text); }
    .admin-tab--active     { color: var(--primary); border-bottom-color: var(--primary); font-weight: 600; }

    .admin-content  { padding: 28px 24px; max-width: 900px; }
    .admin-section h2 {
      font-size: 1.25rem;
      color: var(--primary);
      margin-bottom: 6px;
    }
    .admin-section > .hint { margin-bottom: 14px; }

    .admin-paste-area   { font-family: 'Courier New', monospace; font-size: .875rem; }

    /* Tracker table */
    .tracker-table { width: 100%; border-collapse: collapse; margin-top: 14px; font-size: .875rem; }
    .tracker-table th {
      text-align: left;
      padding: 8px 12px;
      background: var(--surface-warm);
      border-bottom: 2px solid var(--border);
      font-weight: 600;
      color: var(--text-muted);
      font-size: .78rem;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .tracker-table td    { padding: 8px 12px; border-bottom: 1px solid var(--border); }
    .tracker-row--done td { background: #f0fdf4; }
    .tracker-row-main { cursor: pointer; user-select: none; }
    .tracker-row-main:hover td { background: var(--accent-light); }
    .tracker-row--done.tracker-row-main:hover td { background: #dcfce7; }
    .tracker-expand-toggle {
      font-size: .75rem;
      color: var(--text-muted);
      margin-left: 6px;
    }
    .tracker-detail-row td {
      padding: 0;
      border-bottom: 2px solid var(--border);
      background: var(--surface-warm);
    }
    .tracker-detail-inner {
      padding: 12px 16px 14px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      font-size: .8rem;
    }
    .tracker-detail-col h4 {
      font-size: .75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--text-muted);
      margin-bottom: 7px;
    }
    .tracker-remaining-list {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }
    .tracker-chip {
      padding: 2px 8px;
      border-radius: 99px;
      font-size: .75rem;
      background: #fee2e2;
      color: #b91c1c;
      font-weight: 500;
    }
    .tracker-note-item {
      margin-bottom: 8px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
      line-height: 1.4;
    }
    .tracker-note-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    .tracker-note-subject {
      font-weight: 600;
      color: var(--text);
      margin-bottom: 2px;
    }
    .tracker-note-text { color: var(--text-muted); font-style: italic; }

    .mini-progress      { height: 6px; background: var(--border); border-radius: 99px; overflow: hidden; min-width: 80px; }
    .mini-progress-fill { height: 100%; background: var(--progress-fill); border-radius: 99px; }

    .tracker-summary {
      font-size: .9rem;
      padding: 10px 14px;
      background: var(--accent-light);
      border-radius: 7px;
      margin-bottom: 10px;
    }

    /* By-student view */
    .admin-notes-results { margin-top: 20px; }
    .admin-notes-heading { font-size: .9rem; margin-bottom: 12px; }
    .admin-note-item {
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 10px;
      background: var(--surface);
    }
    .admin-note-author {
      font-size: .75rem; font-weight: 600; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: .05em; margin-bottom: 5px;
    }
    .admin-note-text { font-size: .9rem; line-height: 1.6; }

    /* Export preview */
    .export-preview {
      margin-top: 20px;
      padding: 20px;
      border: 1.5px dashed var(--border);
      border-radius: var(--radius);
      min-height: 200px;
      background: var(--surface-warm);
    }
    .print-card h1 {
      font-size: 1.4rem;
      color: var(--primary);
      border-bottom: 2px solid var(--accent-light);
      padding-bottom: 10px;
      margin-bottom: 16px;
    }
    .print-note {
      padding: 10px 14px;
      border-left: 4px solid var(--accent-light);
      margin-bottom: 12px;
      background: var(--surface);
      border-radius: 0 7px 7px 0;
    }
    .print-note .note-author { font-size: .75rem; color: var(--text-muted); margin-bottom: 4px; }
    .print-note .note-text   { font-size: .9rem; line-height: 1.65; }

    /* ══════════════════════════════════════════════════
     * TOAST
     * ══════════════════════════════════════════════════ */
    .toast {
      position: fixed;
      right: 16px; bottom: 16px;
      max-width: 340px;
      padding: 11px 16px;
      border-radius: 9px;
      font-size: .875rem;
      font-weight: 500;
      color: #fff;
      background: #1c1917;
      box-shadow: 0 8px 24px rgba(0,0,0,.18);
      opacity: 0;
      transform: translateY(8px);
      transition: opacity .22s, transform .22s;
      pointer-events: none;
      z-index: 9999;
    }
    .toast--show    { opacity: 1; transform: translateY(0); }
    .toast--success { background: #15803d; }
    .toast--error   { background: #b91c1c; }
    .toast--info    { background: #1d4ed8; }

    /* ══════════════════════════════════════════════════
     * INSTRUCTION BANNER
     * Shown above the notes list — stays visible the
     * whole time the student is writing.
     * ══════════════════════════════════════════════════ */
    .instructions {
      background: var(--accent-light);
      border: 1.5px solid #fcd34d;
      border-radius: var(--radius);
      padding: 16px 18px;
      margin-bottom: 20px;
      font-size: .875rem;
      line-height: 1.65;
    }
    .instructions-heading {
      font-weight: 700;
      font-size: .95rem;
      color: var(--primary);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .instructions ul {
      padding-left: 18px;
      margin: 0;
    }
    .instructions li {
      margin-bottom: 6px;
      color: var(--text);
    }
    .instructions li:last-child { margin-bottom: 0; }
    .instructions strong { color: var(--primary); }
    .instructions .privacy-line {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #fcd34d;
      font-size: .8rem;
      color: var(--text-muted);
    }

    /* ══════════════════════════════════════════════════
     * RESPONSIVE
     * ══════════════════════════════════════════════════ */
    @media (max-width: 500px) {
      .notes-wrap      { padding: 0 10px 40px; }
      .topbar          { padding: 8px 10px; }
      .admin-content   { padding: 18px 12px; }
      .admin-tabs      { padding: 0 8px; }
      .admin-tab       { padding: 10px 10px; font-size: .8rem; }
      .autosave-note   { display: none; }
    }
  </style>
</head>
<body>

  <script>
  /* ════════════════════════════════════════════════════════════════

  /* ════════════════════════════════════════════════════════════════

  /* ════════════════════════════════════════════════════════════════
   * SENTINEL — submitted to Google Form when a student explicitly
   * clears a previously-saved note via the "Clear Note" button.
   * Rows with this value are filtered out of all display/export
   * views and treated as empty on next login. Any subsequent real
   * comment submitted after a sentinel overrides it normally.
   * ════════════════════════════════════════════════════════════════ */
  const SENTINEL = '[CLEARED]';

  /* ════════════════════════════════════════════════════════════════
   * SECTION 2 — APPLICATION STATE
   * ════════════════════════════════════════════════════════════════ */

  const state = {
    view:         'login',      // 'login' | 'notes' | 'admin-login' | 'admin'
    user:         null,         // logged-in student name
    pin:          null,         // their 4-digit PIN
    isNewUser:    false,        // true on very first login (no prior CSV rows)
    notes:        {},           // { subjectName: { text, savedText } }
    csvRows:      [],           // parsed CSV rows (all students' data)
    loading:      false,
    saving:       false,
    adminTab:     'students',   // 'students' | 'tracker' | 'byStudent' | 'export' | 'superlatives'
    adminStudent: '',           // selected student in by-student tab
    autoSaveTimer: null,
    students:     _loadStudentList(),  // active list (localStorage > CONFIG)
    superlatives: _loadSuperlatives(), // { studentName: awardText } — localStorage only
    summaries:    _loadSummaries(),    // { studentName: summaryText } — localStorage only
  };

  // Prefer a localStorage-stored list over the hardcoded CONFIG default
  function _loadStudentList() {
    try {
      const raw = localStorage.getItem('kindnotes_students');
      if (raw) {
        const arr = JSON.parse(raw);
        if (Array.isArray(arr) && arr.length) return arr;
      }
    } catch (e) { /* ignore parse errors */ }
    return [...CONFIG.STUDENTS];
  }

  // Load superlatives from localStorage: { studentName: awardText }
  function _loadSuperlatives() {
    try {
      const raw = localStorage.getItem('kindnotes_superlatives');
      if (raw) return JSON.parse(raw);
    } catch (e) { /* ignore */ }
    return {};
  }

  function _saveSuperlatives() {
    try {
      localStorage.setItem('kindnotes_superlatives', JSON.stringify(state.superlatives));
    } catch (e) { /* ignore */ }
  }

  // Load/save AI summaries from localStorage: { studentName: summaryText }
  function _loadSummaries() {
    try {
      const raw = localStorage.getItem('kindnotes_summaries');
      if (raw) return JSON.parse(raw);
    } catch (e) { /* ignore */ }
    return {};
  }

  function _saveSummaries() {
    try {
      localStorage.setItem('kindnotes_summaries', JSON.stringify(state.summaries));
    } catch (e) { /* ignore */ }
  }


  /* ════════════════════════════════════════════════════════════════
   * SECTION 3 — CSV FETCHING & PARSING
   * Google Sheets CSV can contain commas/newlines inside quoted
   * fields, so we use a proper state-machine parser.
   * ════════════════════════════════════════════════════════════════ */

  async function fetchCSV() {
    if (!CONFIG.CSV_URL || CONFIG.CSV_URL.startsWith('PASTE')) {
      console.log('[KindNotes] CSV_URL not configured — demo mode');
      return [];
    }
    const sep  = CONFIG.CSV_URL.includes('?') ? '&' : '?';
    const url  = CONFIG.CSV_URL + sep + '_cb=' + Date.now();
    console.log('[KindNotes] Fetching CSV:', url);
    const resp = await fetch(url);
    console.log('[KindNotes] CSV response status:', resp.status, resp.statusText);
    if (!resp.ok) throw new Error('CSV fetch failed (' + resp.status + ')');
    const text = await resp.text();
    console.log('[KindNotes] CSV raw (first 300 chars):', text.slice(0, 300));
    const rows = _parseCSV(text);
    console.log('[KindNotes] CSV parsed rows:', rows.length);
    if (rows.length > 0) {
      console.log('[KindNotes] CSV column names:', Object.keys(rows[0]));
      console.log('[KindNotes] CSV first row:', rows[0]);
    }
    return rows;
  }

  function _parseCSV(text) {
    // Strip BOM character — Google Sheets sometimes prepends \ufeff
    const clean  = text.replace(/^\ufeff/, '').replace(/\r/g, '');
    const lines  = clean.split('\n');
    let headers  = null;
    const rows   = [];
    for (const line of lines) {
      if (!line.trim()) continue;
      const fields = _splitCSVLine(line);
      if (!headers) { headers = fields.map(h => h.trim()); continue; }
      if (fields.length < headers.length) continue;
      const row = {};
      headers.forEach((h, i) => { row[h] = (fields[i] || '').trim(); });
      rows.push(row);
    }
    return rows;
  }

  function _splitCSVLine(line) {
    const result = [];
    let field = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') {
        if (inQ && line[i + 1] === '"') { field += '"'; i++; }
        else inQ = !inQ;
      } else if (ch === ',' && !inQ) {
        result.push(field); field = '';
      } else {
        field += ch;
      }
    }
    result.push(field);
    return result;
  }


  /* ════════════════════════════════════════════════════════════════
   * SECTION 4 — LOGIN / AUTH
   * ════════════════════════════════════════════════════════════════ */

  async function doLogin(userName, pinInput) {
    state.loading = true;
    render();

    try {
      const csvRows = await fetchCSV();
      state.csvRows = csvRows;

      // Rows where this student was the Author
      const myRows  = csvRows.filter(r => r['Author Name'] === userName);

      // ── PIN verification ─────────────────────────────────────────
      // Priority 1: localStorage — instant, not affected by Google
      //   Sheets CSV caching (which can be 5+ minutes stale).
      //   Written on every successful login, so it stays current.
      // Priority 2: CSV rows — used when localStorage has no entry
      //   (e.g. first time on a new device).
      // Priority 3: No prior record found anywhere → new user,
      //   accept any 4-digit PIN and store it.
      const localPinKey  = `kindnotes_pin_${userName}`;
      const cachedPin    = localStorage.getItem(localPinKey);
      const csvRows_for_pin = myRows.length > 0 ? myRows : null;

      let isNew = false;

      if (cachedPin) {
        // Returning user on this device — verify against localStorage
        if (cachedPin !== pinInput) {
          state.loading = false;
          render();
          showToast('Incorrect PIN. Try again.', 'error');
          return;
        }
      } else if (csvRows_for_pin) {
        // Returning user on a new device — verify against oldest CSV row
        const oldest = [...myRows].sort(
          (a, b) => new Date(a['Timestamp']) - new Date(b['Timestamp'])
        )[0];
        if (oldest['PIN'] !== pinInput) {
          state.loading = false;
          render();
          showToast('Incorrect PIN. Try again.', 'error');
          return;
        }
      } else {
        // No record anywhere — this is a new user
        isNew = true;
      }

      // Store / refresh PIN in localStorage so future logins on this
      // device are instant and don't depend on CSV freshness.
      try { localStorage.setItem(localPinKey, pinInput); } catch(e) {}


      // For each subject, take the most-recent note the student has written.
      // Sentinel value ([CLEARED]) is treated as empty — the note loads
      // as blank and savedText is '' so no warning is shown on login.
      const latestBySubject = {};
      myRows.forEach(row => {
        const subj = row['Subject Name'];
        const ex   = latestBySubject[subj];
        if (!ex || new Date(row['Timestamp']) > new Date(ex.ts)) {
          const rawText = row['Note Text'] || '';
          latestBySubject[subj] = {
            text: rawText === SENTINEL ? '' : rawText,
            ts: row['Timestamp']
          };
        }
      });

      // Build initial notes state
      const notes = {};
      state.students
        .filter(s => s !== userName)
        .forEach(s => {
          const prior = latestBySubject[s];
          notes[s] = { text: prior?.text ?? '', savedText: prior?.text ?? '' };
        });

      state.user      = userName;
      state.pin       = pinInput;
      state.notes     = notes;
      state.isNewUser = isNew;
      state.view      = 'notes';
      state.loading   = false;

      _startAutoSave();
      render();

      if (isNew) {
        showToast('Welcome! Your PIN has been set. Start writing notes of appreciation! 💛', 'success', 5000);
      } else {
        const n = Object.values(notes).filter(n => n.text.trim()).length;
        showToast(`Welcome back! You've written about ${n} classmate${n !== 1 ? 's' : ''} so far.`, 'success', 4000);
      }

    } catch (err) {
      state.loading = false;
      render();
      showToast('Error loading data. Check your connection and try again.', 'error');
      console.error('Login error:', err);
    }
  }


  /* ════════════════════════════════════════════════════════════════
   * SECTION 5 — SAVING
   * Each note is a separate silent POST to the Google Form.
   * Only notes changed since the last save are submitted.
   *
   * Uses fetch() with mode:'no-cors' — more reliable than the
   * hidden iframe approach. With no-cors we can't read the response
   * body (Google returns an opaque response), but the POST goes
   * through and data lands in the Sheet.
   * ════════════════════════════════════════════════════════════════ */

  function _getDirtyNotes() {
    return Object.entries(state.notes)
      .filter(([, n]) => n.text !== n.savedText)
      .map(([subject, n]) => ({ subject, text: n.text }));
  }

  async function _submitOne(subject, noteText) {
    // Use FormData (not URLSearchParams) and no explicit Content-Type header —
    // the browser sets multipart/form-data automatically, which Google Forms
    // accepts reliably in no-cors mode. Setting Content-Type manually can
    // interfere with the boundary string and break the submission silently.
    const formData = new FormData();
    formData.append(CONFIG.FIELDS.author,  state.user);
    formData.append(CONFIG.FIELDS.pin,     state.pin);
    formData.append(CONFIG.FIELDS.subject, subject);
    formData.append(CONFIG.FIELDS.note,    noteText);

    await fetch(CONFIG.FORM_URL, {
      method: 'POST',
      mode:   'no-cors',   // response is opaque but POST goes through
      body:   formData,
    });
  }

  async function saveNotes(auto = false) {
    const dirty = _getDirtyNotes();

    if (!dirty.length) {
      if (!auto) showToast('Nothing to save — all up to date.', 'info');
      return;
    }

    // Demo mode: form not configured, just pretend
    if (CONFIG.FORM_URL.includes('REPLACE')) {
      dirty.forEach(({ subject }) => { state.notes[subject].savedText = state.notes[subject].text; });
      _updateSaveStatus();
      showToast(`${dirty.length} note${dirty.length > 1 ? 's' : ''} saved (demo mode) ✓`, 'success');
      return;
    }

    state.saving = true;
    _updateSaveBtn();

    for (let i = 0; i < dirty.length; i++) {
      try {
        await _submitOne(dirty[i].subject, dirty[i].text);
        state.notes[dirty[i].subject].savedText = dirty[i].text;
      } catch (err) {
        console.error('Save failed for:', dirty[i].subject, err);
      }
      if (i < dirty.length - 1) await _sleep(300);
    }

    state.saving = false;
    _updateSaveBtn();
    _updateSaveStatus();

    const label = auto ? 'Auto-saved' : 'Saved';
    showToast(`${label} ${dirty.length} note${dirty.length > 1 ? 's' : ''} ✓`, 'success', auto ? 2000 : 3000);
  }

  // Update save status text in-place (avoids full re-render)
  function _updateSaveStatus() {
    const el = document.querySelector('.save-status');
    if (!el) return;
    const dirty = _getDirtyNotes();
    el.className = `save-status ${dirty.length ? 'unsaved' : 'saved'}`;
    el.innerHTML = dirty.length
      ? `<span class="unsaved-dot"></span> ${dirty.length} unsaved change${dirty.length > 1 ? 's' : ''}`
      : `<span class="saved-check">✓</span> All saved`;
  }

  function _updateSaveBtn() {
    const btn = document.querySelector('.save-all-btn');
    if (!btn) return;
    btn.textContent = state.saving ? 'Saving…' : 'Save All';
    btn.disabled    = state.saving;
  }


  /* ════════════════════════════════════════════════════════════════
   * SECTION 6 — AUTO-SAVE
   * ════════════════════════════════════════════════════════════════ */

  function _startAutoSave() {
    if (state.autoSaveTimer) clearInterval(state.autoSaveTimer);
    state.autoSaveTimer = setInterval(() => {
      if (_getDirtyNotes().length) saveNotes(true);
    }, 90_000);  // every 90 seconds, only if there are changes
  }


  /* ════════════════════════════════════════════════════════════════
   * SECTION 7 — RENDER ENGINE
   * ════════════════════════════════════════════════════════════════ */

  function render() {
    const app = document.getElementById('app');
    app.innerHTML = '';
    const views = { login: renderLogin, notes: renderNotes, 'admin-login': renderAdminLogin, admin: renderAdmin };
    const fn = views[state.view];
    if (fn) app.appendChild(fn());
  }


  /* ════════════════════════════════════════════════════════════════
   * SECTION 8 — VIEW: LOGIN
   * ════════════════════════════════════════════════════════════════ */

  function renderLogin() {
    const wrap = _div('login-wrap');

    const hdr = _div('login-header');
    hdr.innerHTML = `
      <div class="login-emoji">💛</div>
      <h1 class="login-title">Senior Say-Nice-Things-To-Each-Other Form</h1>
      <p class="login-subtitle">${_esc(CONFIG.CLASS_NAME)}</p>
    `;

    const card = _div('login-card');

    const nameLbl = _label('name-sel', 'Who are you?');
    const nameSel = _el('select', { id: 'name-sel', class: 'input' });
    nameSel.appendChild(_opt('', 'Select your name…', true));
    [...state.students].sort().forEach(s => nameSel.appendChild(_opt(s, s)));

    const pinLbl  = _label('pin-inp', 'Your PIN');
    const pinInp  = _el('input', {
      type: 'password', id: 'pin-inp', class: 'input',
      placeholder: '4-digit number', maxlength: '4',
      inputmode: 'numeric', pattern: '[0-9]*',
    });

    const pinHint = _div('hint');
    pinHint.textContent = 'First time? Enter any 4-digit number to set your PIN.';

    const loginBtn = _el('button', { class: 'btn btn-primary' });
    loginBtn.textContent = state.loading ? 'Loading…' : 'Sign In';
    loginBtn.disabled    = state.loading;
    loginBtn.addEventListener('click', () => {
      const name = nameSel.value;
      const pin  = pinInp.value.trim();
      if (!name)                { showToast('Please select your name.', 'error'); return; }
      if (!/^\d{4}$/.test(pin)) { showToast('Please enter a 4-digit PIN.', 'error'); return; }
      doLogin(name, pin);
    });
    pinInp.addEventListener('keydown', e => { if (e.key === 'Enter') loginBtn.click(); });

    card.append(nameLbl, nameSel, pinLbl, pinInp, pinHint, loginBtn);

    const adminLnk = _div('admin-link');
    adminLnk.innerHTML = '<a href="#" id="_adminLnk">Admin access</a>';
    adminLnk.querySelector('#_adminLnk').addEventListener('click', e => {
      e.preventDefault(); state.view = 'admin-login'; render();
    });

    const verLnk = _div('admin-link');
    verLnk.style.cssText = 'margin-top:4px;font-size:.7rem;';
    verLnk.textContent = `v${APP_VERSION.number} · ${APP_VERSION.timestamp}`;

    wrap.append(hdr, card, adminLnk, verLnk);
    return wrap;
  }


  /* ════════════════════════════════════════════════════════════════
   * SECTION 9 — VIEW: NOTES (student-facing)
   * ════════════════════════════════════════════════════════════════ */

  function renderNotes() {
    const wrap = _div('notes-wrap');

    /* Top bar */
    const topbar = _div('topbar');
    const tLeft  = _div('topbar-left');
    tLeft.innerHTML = '<span style="font-size:1.1rem">💛</span><strong>Notes of Appreciation</strong>';
    const tRight = _div('topbar-right');
    const uSpan  = _el('span', { class: 'topbar-user' });
    uSpan.textContent = `Hi, ${state.user}!`;
    const logoutBtn = _el('button', { class: 'btn btn-ghost btn-sm' });
    logoutBtn.textContent = 'Log out';
    logoutBtn.addEventListener('click', () => {
      if (_getDirtyNotes().length && !confirm('You have unsaved changes. Log out anyway?')) return;
      clearInterval(state.autoSaveTimer);
      Object.assign(state, { view: 'login', user: null, pin: null, notes: {}, csvRows: [] });
      render();
    });
    tRight.append(uSpan, logoutBtn);
    topbar.append(tLeft, tRight);

    /* Progress bar */
    const total = Object.keys(state.notes).length;
    const done  = Object.values(state.notes).filter(n => n.text.trim()).length;
    const pct   = total ? Math.round(done / total * 100) : 0;
    const prog  = _div('progress-wrap');
    prog.innerHTML = `
      <div class="progress-label">
        <span>Your progress</span>
        <span class="progress-count">${done} of ${total} classmates</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" style="width:${pct}%"></div>
      </div>
      ${done === total && total > 0 ? '<div class="progress-complete">🎉 You\'ve written about everyone!</div>' : ''}
    `;

    /* Save bar */
    const dirty = _getDirtyNotes();
    const saveBar = _div('save-bar');
    const saveBtn = _el('button', { class: 'btn btn-primary save-all-btn' });
    saveBtn.textContent = state.saving ? 'Saving…' : 'Save All';
    saveBtn.disabled    = state.saving;
    saveBtn.addEventListener('click', () => saveNotes(false));

    const saveSt = _div(`save-status ${dirty.length ? 'unsaved' : 'saved'}`);
    saveSt.innerHTML = dirty.length
      ? `<span class="unsaved-dot"></span> ${dirty.length} unsaved change${dirty.length > 1 ? 's' : ''}`
      : `<span class="saved-check">✓</span> All saved`;

    const autoNote = _div('autosave-note');
    autoNote.textContent = 'Auto-saves every 90 seconds';

    saveBar.append(saveBtn, saveSt, autoNote);

    /* Instruction banner */
    const instructions = _div('instructions');
    instructions.innerHTML = `
      <div class="instructions-heading">✏️ How to write your notes</div>
      <ul>
        <li>
          Write a <strong>short but sincere note <em>to</em></strong> each person —
          the goal is to make them feel loved.
          (Bonus points if you make them ugly-cry. 🥲)
        </li>
        <li>
          <strong>These notes will be read aloud at the DIM Senior Showcase,
          in front of parents and audience members</strong> — treat everything
          you write as fully public. No personal info, no embarrassing or
          inappropriate content. Notes that don't meet that bar will be deleted
          and you'll be asked to resubmit.
        </li>
        <li>
          <strong>Your note is anonymous by default</strong> — we will not reveal
          who wrote each comment. If you want credit, include your first name or
          nickname somewhere in the note itself.
        </li>
      </ul>
      <div class="privacy-line">
        🔒 <strong>Privacy:</strong> This app collects only your name and the notes you
        write. Notes are stored in a private Google Sheet accessible only to the
        teacher. No personal information is shared with other students or third parties.
        Your name appears only on your own saved notes, never on notes written about you.
      </div>
    `;

    /* Notes list — empty notes first, then filled, each group alpha-sorted */
    const list = _div('notes-list');
    Object.keys(state.notes)
      .sort((a, b) => {
        const aFull = !!state.notes[a].text.trim();
        const bFull = !!state.notes[b].text.trim();
        if (aFull !== bFull) return aFull ? 1 : -1;
        return a.localeCompare(b);
      })
      .forEach(subject => list.appendChild(_buildNoteCard(subject)));

    wrap.append(topbar, prog, saveBar, instructions, list);
    return wrap;
  }

  /* ════════════════════════════════════════════════════════════════
   * _clearNote — submits sentinel directly, resets in-memory state
   * so the note card immediately shows as empty this session.
   * ════════════════════════════════════════════════════════════════ */
  async function _clearNote(subject, ta, card, hdr, warningEl, clearBtn) {
    clearBtn.disabled = true;
    clearBtn.textContent = 'Clearing…';

    try {
      await _submitOne(subject, SENTINEL);
    } catch (err) {
      console.error('Clear note failed:', err);
    }

    // Reset in-memory state to fully empty
    state.notes[subject].text      = '';
    state.notes[subject].savedText = '';
    ta.value = '';

    // Update card visuals
    card.classList.remove('note-card--done');
    const st = hdr.querySelector('.note-status');
    st.textContent = 'not yet';
    st.className   = 'note-status note-status--empty';

    warningEl.style.display = 'none';
    clearBtn.style.display  = 'none';

    _updateSaveStatus();
    showToast('Note cleared ✓', 'success', 2000);
  }

  function _buildNoteCard(subject) {
    const n      = state.notes[subject];
    const hasTxt = n.text.trim().length > 0;
    const card   = _div(`note-card${hasTxt ? ' note-card--done' : ''}`);

    const hdr = _div('note-card-header');
    hdr.innerHTML = `
      <span class="note-student-name">${_esc(subject)}</span>
      <span class="note-status ${hasTxt ? 'note-status--done' : 'note-status--empty'}">
        ${hasTxt ? '✓ written' : 'not yet'}
      </span>
    `;

    const ta = _el('textarea', {
      class: 'note-textarea', rows: '4',
      placeholder: `Write a short, sincere note to ${subject}. (Anonymous by default — include your name only if you want credit.)`,
    });
    ta.value = n.text;

    // Warning: shown when textarea is empty but there's a real saved comment.
    // "Real" means savedText is non-empty — sentinel is converted to '' on load
    // so it never triggers this warning on login.
    const warningEl = _div('note-clear-warning');
    warningEl.style.display = 'none';
    warningEl.innerHTML = `⚠️ <strong>This note is blank.</strong> Your previously-saved comment will still appear when the notes are printed — blank notes are ignored to prevent accidental data loss. To truly remove it, use <strong>Clear Note</strong> below, or type a replacement and save.`;

    // Clear Note button: only shown when there's a real saved comment to clear
    const clearBtn = _el('button', { class: 'btn note-clear-btn' });
    clearBtn.textContent = 'Clear Note';
    clearBtn.style.display = 'none';
    clearBtn.addEventListener('click', () => {
      _clearNote(subject, ta, card, hdr, warningEl, clearBtn);
    });

    ta.addEventListener('input', () => {
      n.text = ta.value;
      const full         = n.text.trim().length > 0;
      const hasRealSaved = n.savedText.trim().length > 0;

      card.classList.toggle('note-card--done', full);
      const st = hdr.querySelector('.note-status');
      st.textContent = full ? '✓ written' : 'not yet';
      st.className   = `note-status ${full ? 'note-status--done' : 'note-status--empty'}`;

      // Show warning + clear button only when textarea is empty
      // AND there's a previously saved comment worth preserving
      warningEl.style.display = (!full && hasRealSaved) ? '' : 'none';
      clearBtn.style.display  = (!full && hasRealSaved) ? '' : 'none';

      _updateSaveStatus();
    });

    card.append(hdr, ta, warningEl, clearBtn);
    return card;
  }


  /* ════════════════════════════════════════════════════════════════
   * SECTION 10 — VIEW: ADMIN LOGIN
   * ════════════════════════════════════════════════════════════════ */

  function renderAdminLogin() {
    const wrap = _div('login-wrap');

    const hdr = _div('login-header');
    hdr.innerHTML = '<div class="login-emoji">🔑</div><h1 class="login-title">Admin</h1>';

    const card = _div('login-card');
    const lbl  = _label('adminPass', 'Admin password');
    const inp  = _el('input', { type: 'password', id: 'adminPass', class: 'input', placeholder: 'Password' });
    const btn  = _el('button', { class: 'btn btn-primary' });
    btn.textContent = state.loading ? 'Loading…' : 'Enter';
    btn.disabled    = state.loading;

    btn.addEventListener('click', async () => {
      // Hash the entered password and compare against stored hash.
      // The stored value is a SHA-256 digest — it cannot be reversed.
      const enteredHash = await _sha256(inp.value);
      if (enteredHash !== CONFIG.ADMIN_PASSWORD_HASH) { showToast('Incorrect password.', 'error'); return; }
      state.loading = true; render();
      fetchCSV()
        .then(rows => { state.csvRows = rows; })
        .catch(() => {})
        .finally(() => { state.view = 'admin'; state.loading = false; render(); });
    });
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') btn.click(); });

    const back = _div('admin-link');

  /* ── Tab: Completion Tracker ──────────────────────────────────── */

  function _adminTabTracker() {
    const sec = _div('admin-section');
    sec.innerHTML = '<h2>Completion Tracker</h2>';

    if (!state.csvRows.length) {
      const msg = _div('hint');
      msg.innerHTML = 'No CSV data loaded. Make sure <code>CSV_URL</code> is configured and the sheet is published.';
      sec.append(msg, _refreshBtn());
      return sec;
    }

    // Build author → { written: Set<subject>, notes: { subject: text } }
    const data = {};
    state.students.forEach(s => { data[s] = { written: new Set(), notes: {} }; });

    // For each author/subject pair, keep only the most recent note
    const latestByPair = {};
    state.csvRows.forEach(row => {
      const author  = row['Author Name'];
      const subject = row['Subject Name'];
      const note    = (row['Note Text'] || '').trim();
      const ts      = row['Timestamp'];
      if (!author || !subject || !note || note === SENTINEL || !data[author]) return;
      const key = `${author}||${subject}`;
      if (!latestByPair[key] || new Date(ts) > new Date(latestByPair[key].ts)) {
        latestByPair[key] = { note, ts };
      }
    });

    // Populate data sets from deduplicated pairs
    Object.entries(latestByPair).forEach(([key, { note }]) => {
      const [author, subject] = key.split('||');
      if (data[author]) {
        data[author].written.add(subject);
        data[author].notes[subject] = note;
      }
    });

    const maxPeers  = state.students.length - 1;
    const fullyDone = state.students.filter(s => (data[s]?.written.size ?? 0) >= maxPeers).length;

    const summary = _div('tracker-summary');
    summary.innerHTML = `
      <strong>${fullyDone}</strong> of <strong>${state.students.length}</strong>
      students have written about all their classmates.
      <span class="hint" style="display:inline;margin-left:8px">Click any row to expand.</span>
    `;

    const tbl  = document.createElement('table');
    tbl.className = 'tracker-table';
    const head = document.createElement('thead');
    head.innerHTML = '<tr><th>Student</th><th>Written</th><th>Remaining</th><th style="min-width:100px">Progress</th></tr>';
    const body = document.createElement('tbody');

    // Track which row is currently expanded
    let expandedStudent = null;

    [...state.students].sort().forEach(student => {
      const cnt      = data[student]?.written.size ?? 0;
      const left     = Math.max(0, maxPeers - cnt);
      const pct      = maxPeers ? Math.round(cnt / maxPeers * 100) : 0;
      const allPeers = state.students.filter(s => s !== student).sort();
      const remaining = allPeers.filter(s => !data[student]?.written.has(s));

      // ── Main summary row ────────────────────────────────────────
      const tr = document.createElement('tr');
      tr.className = `tracker-row-main${pct >= 100 ? ' tracker-row--done' : ''}`;
      tr.innerHTML = `
        <td>${_esc(student)} <span class="tracker-expand-toggle">▶</span></td>
        <td>${cnt} / ${maxPeers}</td>
        <td>${left > 0 ? left : '✓ done!'}</td>
        <td><div class="mini-progress"><div class="mini-progress-fill" style="width:${pct}%"></div></div></td>
      `;

      // ── Detail row (hidden by default) ──────────────────────────
      const detailTr = document.createElement('tr');
      detailTr.className = 'tracker-detail-row';
      detailTr.style.display = 'none';

      const detailTd = document.createElement('td');
      detailTd.colSpan = 4;

      const inner = _div('tracker-detail-inner');

      // Left column: remaining names as chips
      const leftCol = _div('tracker-detail-col');
      const leftHead = document.createElement('h4');
      leftHead.textContent = remaining.length
        ? `Still needs to write (${remaining.length})`
        : '✓ Written about everyone';
      leftCol.appendChild(leftHead);

      if (remaining.length) {
        const chipWrap = _div('tracker-remaining-list');
        remaining.forEach(name => {
          const chip = _div('tracker-chip');
          chip.textContent = name;
          chipWrap.appendChild(chip);
        });
        leftCol.appendChild(chipWrap);
      }

      // Right column: notes they've written, sorted by subject name
      const rightCol = _div('tracker-detail-col');
      const rightHead = document.createElement('h4');
      rightHead.textContent = cnt ? `Notes written (${cnt})` : 'No notes yet';
      rightCol.appendChild(rightHead);

      const notesWritten = Object.entries(data[student]?.notes ?? {})
        .sort((a, b) => a[0].localeCompare(b[0]));

      notesWritten.forEach(([subject, noteText]) => {
        const item = _div('tracker-note-item');
        item.innerHTML = `
          <div class="tracker-note-subject">${_esc(subject)}</div>
          <div class="tracker-note-text">${_esc(noteText)}</div>
        `;
        rightCol.appendChild(item);
      });

      inner.append(leftCol, rightCol);
      detailTd.appendChild(inner);
      detailTr.appendChild(detailTd);

      // Toggle on click
      tr.addEventListener('click', () => {
        const toggle = tr.querySelector('.tracker-expand-toggle');
        const isOpen = detailTr.style.display !== 'none';

        // Collapse previously expanded row if different
        if (expandedStudent && expandedStudent !== student) {
          const prevDetail = body.querySelector(`[data-expanded="${expandedStudent}"]`);
          const prevMain   = body.querySelector(`[data-main="${expandedStudent}"]`);
          if (prevDetail) prevDetail.style.display = 'none';
          if (prevMain) prevMain.querySelector('.tracker-expand-toggle').textContent = '▶';
        }

        detailTr.style.display = isOpen ? 'none' : '';
        toggle.textContent = isOpen ? '▶' : '▼';
        expandedStudent = isOpen ? null : student;
      });

      tr.setAttribute('data-main', student);
      detailTr.setAttribute('data-expanded', student);

      body.append(tr, detailTr);
    });

    tbl.append(head, body);
    sec.append(summary, _refreshBtn(), tbl);
    return sec;
  }

  function _buildPrintCard(studentName) {
    const card = _div('print-card');

    // Collect most-recent note per author
    const byAuthor = {};
    state.csvRows
      .filter(r => r['Subject Name'] === studentName && (r['Note Text'] || '').trim() && r['Note Text'] !== SENTINEL)
      .forEach(row => {
        const a = row['Author Name'];
        if (!byAuthor[a] || new Date(row['Timestamp']) > new Date(byAuthor[a].ts)) {
          byAuthor[a] = { text: row['Note Text'], ts: row['Timestamp'] };
        }
      });

    const entries = Object.entries(byAuthor).sort((a, b) => a[0].localeCompare(b[0]));

    card.innerHTML = `<h1>💛 Notes of appreciation for  ${_esc(studentName)}, from the DIM senior class.</h1>`;

    // Summary — only rendered if one has been entered in Admin → Summaries
    const summary = state.summaries[studentName];
    if (summary) {
      const summaryEl = document.createElement('p');
      summaryEl.className = 'print-summary';
      summaryEl.textContent = summary;
      card.appendChild(summaryEl);
    }

    if (!entries.length) {
      card.innerHTML += `<p style="color:#78716c;font-style:italic">No notes yet.</p>`;
    } else {
      // Bullet list — tight spacing, no per-note author label
      const ul = document.createElement('ul');
      entries.forEach(([, { text }]) => {
        const li = document.createElement('li');
        li.textContent = text;
        ul.appendChild(li);
      });
      card.appendChild(ul);
    }

    /* ── SUPERLATIVES ────────────────────────────────────────────
       Populated from Admin → Superlatives tab, stored in
       localStorage. Shows nothing if no award has been entered.  */
    const award = state.superlatives[studentName];
    if (award) {
      const suprEl = document.createElement('div');
      suprEl.className   = 'superlative';
      suprEl.textContent = `🏆 ${award}`;
      card.appendChild(suprEl);
    }

    return card;
  }

  function _openPrintWindow(studentList) {
    const win = window.open('', '_blank');
    if (!win) { showToast('Pop-up blocked — allow pop-ups for this site.', 'error'); return; }

    const cardsHTML = studentList
      .map(name => `<div class="page-wrap"><div class="print-card">${_buildPrintCard(name).innerHTML}</div></div>`)
      .join('');

    win.document.write(`<!DOCTYPE html><html><head>
      <meta charset="UTF-8">
      <title>Senior SayNiceThings Notes — Print</title>
      <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
          font-family: Georgia, serif;
          color: #292524;
        }
        /*
         * zoom (unlike transform:scale) changes actual layout
         * dimensions — the browser's page-break calculation sees
         * the shrunk size, so the award/superlative stays on the
         * same page as the rest of the content.
         * No overflow:hidden anywhere — nothing gets clipped.
         */
        .page-wrap {
          page-break-after: always;
          break-after: page;
        }
        .print-card {
          width: 100%;
          padding: 14px 20px 10px;
        }
        h1 {
          color: #92400e;
          border-bottom: 2px solid #fef3c7;
          padding-bottom: 6px;
          margin: 0 0 10px 0;
          font-size: 1.25rem;
        }
        .print-summary {
          font-family: Georgia, serif;
          font-size: .9rem;
          line-height: 1.6;
          color: #292524;
          margin: 0 0 12px 0;
          padding: 10px 12px;
          border-left: 3px solid #fcd34d;
          background: #fffbeb;
          font-style: italic;
        }
        ul { margin: 0; padding-left: 18px; }
        li { line-height: 1.35; margin-bottom: 5px; font-size: .88rem; }
        li:last-child { margin-bottom: 0; }
        .superlative {
          margin-top: 14px;
          padding: 7px 10px;
          border: 1.5px solid #fcd34d;
          border-radius: 6px;
          background: #fffbeb;
          color: #92400e;
          font-style: italic;
          font-size: .88rem;
          font-weight: 600;
        }
        @media print {
          @page { size: letter; margin: 0.5in; }
          .print-card { padding: 0; }
        }
      </style>
    </head><body>
      ${cardsHTML}
      <script>
        window.onload = function() {
          setTimeout(function() {
            // Usable printed height for US Letter with 0.5in margins:
            // (11in − 1in) × 96px/in = 960px
            var pageH = (11 - 1) * 96; // 960px

            // CRITICAL: constrain body to the actual print column width
            // before measuring scrollHeight. Without this, the popup window
            // may be wider than the print column (7.5in = 720px at 96dpi),
            // causing text to wrap less on screen than in print — making
            // cards measure shorter than they actually print, so zoom never
            // triggers even when the content overflows.
            var colW = 7.5 * 96; // 720px — Letter minus 0.5in left+right margins
            document.body.style.width    = colW + 'px';
            document.body.style.maxWidth = colW + 'px';

            // Give layout one more frame to reflow at the new width
            requestAnimationFrame(function() {
              document.querySelectorAll('.print-card').forEach(function(card) {
                var cardH = card.scrollHeight;
                if (cardH > pageH) {
                  card.style.zoom = String(pageH / cardH);
                }
              });

              setTimeout(function() { window.print(); }, 200);
            });
          }, 200);
        };
      <\/script>
    </body></html>`);
    win.document.close();
  }

  /* Small "refresh data" button used in tracker tab */
  function _refreshBtn() {
    const btn = _el('button', { class: 'btn btn-ghost btn-sm', style: 'margin-bottom:12px' });
    btn.textContent = '↻ Refresh data from Sheet';
    btn.addEventListener('click', () => {
      btn.disabled = true; btn.textContent = 'Refreshing…';
      fetchCSV()
        .then(rows => { state.csvRows = rows; render(); showToast('Data refreshed.', 'success'); })
        .catch(() => showToast('Refresh failed — check CSV_URL.', 'error'))
        .finally(() => { btn.disabled = false; });
    });
    return btn;
  }


  /* ════════════════════════════════════════════════════════════════
   * SECTION 12 — DOM HELPERS
   * ════════════════════════════════════════════════════════════════ */

  function _div(cls) {
    const d = document.createElement('div');
    if (cls) d.className = cls;
    return d;
  }

  function _el(tag, attrs) {
    const e = document.createElement(tag);
    if (attrs) Object.entries(attrs).forEach(([k, v]) => {
      k === 'class' ? (e.className = v) : e.setAttribute(k, v);
    });
    return e;
  }

  function _opt(value, text, selected = false) {
    const o = document.createElement('option');
    o.value = value; o.textContent = text; o.selected = selected;
    return o;
  }

  function _label(forId, text) {
    const l = document.createElement('label');
    l.setAttribute('for', forId);
    l.textContent = text;
    return l;
  }

  /* Escape HTML special chars — always use this when injecting
     user-supplied text into innerHTML to prevent XSS            */
  function _esc(str) {
    return String(str ?? '')
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function _sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  // Hash a string with SHA-256, return lowercase hex.
  // Uses the browser's built-in Web Crypto API — no libraries needed.
  async function _sha256(str) {
    const buf    = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2, '0')).join('');
  }


  /* ════════════════════════════════════════════════════════════════
   * SECTION 13 — TOAST NOTIFICATIONS
   * ════════════════════════════════════════════════════════════════ */

  function showToast(msg, type = 'info', duration = 3200) {
    const t = document.getElementById('toast');
    if (!t) return;
    t.textContent = msg;
    t.className   = `toast toast--${type} toast--show`;
    clearTimeout(t._t);
    t._t = setTimeout(() => { t.className = 'toast'; }, duration);
  }


  /* ════════════════════════════════════════════════════════════════
   * BOOT — kick off the render cycle
   * ════════════════════════════════════════════════════════════════ */

  render();

  </script>
</body>
</html>
